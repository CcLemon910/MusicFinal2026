<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MusicFinal2026 — 柴可夫斯基《四季》</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     設定區：顏色與字體
     ============================================================ */
  :root{
    --ink:        #0a1420;   /* 深夜藍黑 */
    --ink-2:      #122236;
    --gold:       #d9b46a;   /* 暖金 */
    --gold-soft:  #e8d3a0;
    --cream:      #f4ecdc;   /* 米白（紙張） */
    --rose:       #c98b7a;   /* 暖玫瑰點綴 */
    --shadow:     rgba(0,0,0,.55);
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{ height:100%; overflow:hidden; }

  body{
    background: radial-gradient(circle at 50% 30%, var(--ink-2), var(--ink) 70%);
    font-family:"Noto Serif TC","Cormorant Garamond",serif;
    color:var(--cream);
    position:relative;
  }

  /* ---------- 背景影片（bg.mp4，循環，同時當背景音樂） ---------- */
  #bgVideo{
    position:fixed; inset:0;
    width:100%; height:100%;
    object-fit:cover;
    opacity:.28;                 /* 壓暗，讓樂譜看得清楚 */
    filter:saturate(.8) brightness(.7);
    z-index:0;
  }
  /* 暗角 + 顆粒感氛圍 */
  #atmosphere{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(5,10,18,.85) 100%);
    mix-blend-mode:multiply;
  }
  #grain{
    position:fixed; inset:0; z-index:2; pointer-events:none; opacity:.06;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ============================================================
     漂浮的樂譜場
     ============================================================ */
  #field{ position:fixed; inset:0; z-index:5; }

  .sheet{
    position:absolute;
    width:clamp(82px, 13vw, 170px);
    cursor:pointer;
    /* 用中心點對齊定位，左右邊不會被切掉 */
    transform:translate(-50%, -50%);
  }
  .sheet .floatwrap{
    /* 漂浮動畫放在這層，不會干擾上面的置中 */
    animation:drift var(--dur) ease-in-out var(--delay) infinite alternate;
    will-change:transform;
  }
  .sheet .frame{
    position:relative;
    padding:8px 8px 4px;
    background:linear-gradient(160deg,#fbf6ea,#e9ddc4);
    border:1px solid rgba(217,180,106,.5);
    border-radius:3px;
    box-shadow:0 12px 30px var(--shadow), 0 2px 6px rgba(0,0,0,.4);
    transform:rotate(var(--rot));
    transition:transform .4s cubic-bezier(.2,.8,.3,1), box-shadow .4s ease;
  }
  .sheet img{
    display:block;
    width:100%;
    aspect-ratio:3 / 4;          /* 固定顯示比例：十二張外框一致 */
    object-fit:contain;          /* 完整顯示整頁、不裁切、永遠不變形 */
    border-radius:1px;
    background:#fbf6ea;          /* 留白處用紙張色，融入外框 */
  }
  .sheet .label{
    margin-top:5px; text-align:center;
    font-family:"Cormorant Garamond",serif;
    color:#5a4a2e; font-size:.8rem; letter-spacing:.04em;
    line-height:1.1;
  }
  .sheet .label b{ display:block; font-family:"Noto Serif TC"; font-weight:600; font-size:.82rem; }
  .sheet:hover{ z-index:20; }
  .sheet:hover .frame{
    transform:rotate(0deg) scale(1.08) translateY(-6px);
    box-shadow:0 0 0 1px var(--gold), 0 22px 50px rgba(0,0,0,.6), 0 0 40px rgba(217,180,106,.35);
  }
  /* 四月（遊戲）加一個小標記 */
  .sheet.game .frame::after{
    content:"▶ 進入遊戲";
    position:absolute; left:50%; bottom:-9px; transform:translateX(-50%);
    background:var(--rose); color:#1a0d09;
    font-family:"Noto Serif TC"; font-weight:600; font-size:.62rem;
    padding:2px 9px; border-radius:20px; white-space:nowrap;
    box-shadow:0 3px 8px rgba(0,0,0,.4);
  }

  @keyframes drift{
    from{ transform:translate(0,0); }
    to  { transform:translate(var(--dx), var(--dy)); }
  }

  /* ============================================================
     進場畫面（解決手機自動播放限制：需要先點一下）
     ============================================================ */
  #enter{
    position:fixed; inset:0; z-index:60;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:1.4rem;
    background:radial-gradient(circle at 50% 40%, var(--ink-2), var(--ink) 75%);
    transition:opacity 1.1s ease, visibility 1.1s;
  }
  #enter.hidden{ opacity:0; visibility:hidden; }
  #enter .kicker{ font-family:"Cormorant Garamond"; font-style:italic; color:var(--gold); letter-spacing:.3em; font-size:1rem; text-transform:uppercase; }
  #enter h1{
    font-family:"Cormorant Garamond",serif; font-weight:500;
    font-size:clamp(2.6rem,9vw,5.5rem); line-height:1;
    color:var(--cream); letter-spacing:.02em;
  }
  #enter h1 span{ color:var(--gold); }
  #enter .sub{ font-weight:300; color:#b9c4d1; max-width:520px; padding:0 24px; line-height:1.8; }
  #enterBtn{
    margin-top:.6rem;
    font-family:"Noto Serif TC"; font-weight:400; font-size:1.05rem;
    color:var(--ink); background:linear-gradient(160deg,var(--gold-soft),var(--gold));
    border:none; padding:14px 46px; border-radius:40px; cursor:pointer;
    letter-spacing:.15em;
    box-shadow:0 10px 30px rgba(217,180,106,.4);
    transition:transform .3s ease, box-shadow .3s ease;
  }
  #enterBtn:hover{ transform:translateY(-3px); box-shadow:0 16px 40px rgba(217,180,106,.55); }

  /* ============================================================
     彈窗：照片 + 播放曲目
     ============================================================ */
  #modal{
    position:fixed; inset:0; z-index:80;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    background:rgba(4,8,14,.82); backdrop-filter:blur(6px);
    opacity:0; visibility:hidden; transition:opacity .45s ease, visibility .45s;
  }
  #modal.show{ opacity:1; visibility:visible; }
  .card{
    position:relative;
    width:auto; max-width:min(560px, 92vw);
    max-height:92vh;
    display:flex; flex-direction:column;
    background:linear-gradient(160deg,#fbf6ea,#ece0c8);
    border-radius:6px; padding:18px;
    box-shadow:0 30px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(217,180,106,.4);
    transform:scale(.92) translateY(14px); transition:transform .45s cubic-bezier(.2,.8,.3,1);
  }
  #modal.show .card{ transform:none; }
  /* 重點：max-width/max-height + auto，瀏覽器會等比例縮放，永遠不變形也不超出 */
  .card img{
    display:block;
    width:auto; height:auto;
    max-width:100%; max-height:68vh;
    margin:0 auto;
    border-radius:3px; background:#ddd;
  }
  .card .meta{ padding:14px 6px 4px; color:#3f3320; text-align:center; }
  .card .meta .mn{ font-family:"Cormorant Garamond"; font-style:italic; color:var(--rose); letter-spacing:.2em; font-size:.95rem; }
  .card .meta h2{ font-family:"Noto Serif TC"; font-weight:600; font-size:1.4rem; margin:.15rem 0; }
  .card .meta .play{ font-size:.85rem; color:#7a6b4d; display:flex; align-items:center; gap:8px; justify-content:center; }
  .eq{ display:inline-flex; gap:2px; height:12px; align-items:flex-end; }
  .eq i{ width:3px; background:var(--rose); animation:eq .9s ease-in-out infinite; }
  .eq i:nth-child(2){ animation-delay:.2s } .eq i:nth-child(3){ animation-delay:.4s } .eq i:nth-child(4){ animation-delay:.1s }
  @keyframes eq{ 0%,100%{height:4px} 50%{height:12px} }

  /* 遊戲彈窗（iframe 全螢幕） */
  #gameModal{
    position:fixed; inset:0; z-index:80;
    background:#000; display:none;
  }
  #gameModal.show{ display:block; }
  #gameFrame{ width:100%; height:100%; border:none; display:block; }

  .close{
    position:absolute; top:14px; right:18px; z-index:90;
    width:44px; height:44px; border-radius:50%;
    background:rgba(10,18,28,.7); color:var(--cream);
    border:1px solid rgba(217,180,106,.5);
    font-size:1.4rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background .25s, transform .25s;
  }
  .close:hover{ background:var(--rose); color:#1a0d09; transform:rotate(90deg); }
  .card .close{ top:-16px; right:-16px; }

  /* 右下角靜音鈕 */
  #mute{
    position:fixed; right:18px; bottom:18px; z-index:55;
    width:48px; height:48px; border-radius:50%;
    background:rgba(10,18,28,.6); border:1px solid rgba(217,180,106,.4);
    color:var(--gold); font-size:1.2rem; cursor:pointer;
    display:none; align-items:center; justify-content:center;
    backdrop-filter:blur(4px); transition:transform .25s;
  }
  #mute:hover{ transform:scale(1.1); }

  /* 左上角標題 */
  #brand{
    position:fixed; top:20px; left:24px; z-index:55; display:none;
    font-family:"Cormorant Garamond"; font-style:italic;
    color:var(--gold); letter-spacing:.15em; font-size:1.1rem;
    text-shadow:0 2px 10px rgba(0,0,0,.6);
  }
  #brand b{ font-style:normal; color:var(--cream); }
</style>
</head>
<body>

  <!-- 背景影片（同時是循環背景音樂）。沒有 bg.mp4 時不影響其他功能 -->
  <video id="bgVideo" loop playsinline preload="auto">
    <source src="bg.mp4" type="video/mp4">
  </video>
  <div id="atmosphere"></div>
  <div id="grain"></div>

  <!-- 漂浮樂譜場（由 JS 產生） -->
  <div id="field"></div>

  <!-- 左上品牌 / 右下靜音 -->
  <div id="brand"><b>MusicFinal</b> 2026</div>
  <button id="mute" title="靜音 / 開聲">♪</button>

  <!-- 照片 + 曲目彈窗 -->
  <div id="modal">
    <div class="card">
      <button class="close" data-close="modal">×</button>
      <img id="modalImg" alt="照片">
      <div class="meta">
        <div class="mn" id="modalMonth"></div>
        <h2 id="modalTitle"></h2>
        <div class="play">
          <span class="eq"><i></i><i></i><i></i><i></i></span>
          <span id="modalPlay">正在播放…</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 遊戲彈窗 -->
  <div id="gameModal">
    <button class="close" data-close="game">×</button>
    <iframe id="gameFrame" title="四月小遊戲" allow="autoplay; fullscreen"></iframe>
  </div>

  <!-- 進場畫面 -->
  <div id="enter">
    <div class="kicker">Pyotr Ilyich Tchaikovsky</div>
    <h1>The <span>Seasons</span><br>四 季</h1>
    <p class="sub">十二首鋼琴小品，對應一年的十二個月。<br>輕觸任一張樂譜，聆聽屬於那個月份的旋律。</p>
    <button id="enterBtn">進 入 展 覽</button>
  </div>

<script>
/* ============================================================
   設定區：十二個月份的資料
   - num   : 月份數字（檔名用）
   - name  : 顯示的中文曲名
   - en    : 英文曲名
   - isGame: true 代表點擊後開遊戲（四月）
   檔名 / 路徑規則（要改路徑只改下面的 PATHS 就好）：
     樂譜  = img/${num}.png       例：img/1.png
     音樂  = music/${num}.mp3     例：music/1.mp3
     照片  = ${num}pic.png        例：1pic.png（放在根目錄）
     遊戲  = game/index.html
     背景  = bg.mp4
   ============================================================ */
const MONTHS = [
  { num:1,  name:"一月 · 爐邊",      en:"By the Hearth" },
  { num:2,  name:"二月 · 狂歡節",    en:"Carnival" },
  { num:3,  name:"三月 · 雲雀之歌",  en:"Song of the Lark" },
  { num:4,  name:"四月 · 雪花蓮",    en:"Snowdrop", isGame:true },
  { num:5,  name:"五月 · 白夜",      en:"White Nights" },
  { num:6,  name:"六月 · 船歌",      en:"Barcarolle" },
  { num:7,  name:"七月 · 割草人之歌",en:"Song of the Reaper" },
  { num:8,  name:"八月 · 收穫",      en:"Harvest" },
  { num:9,  name:"九月 · 狩獵",      en:"The Hunt" },
  { num:10, name:"十月 · 秋之歌",    en:"Autumn Song" },
  { num:11, name:"十一月 · 雪橇",    en:"Troika" },
  { num:12, name:"十二月 · 聖誕節",  en:"Christmas" },
];

/* ---- 檔案路徑（要搬資料夾就改這裡） ---- */
const PATHS = {
  sheet: n => `img/${n}.png`,      // 樂譜在 img 資料夾
  music: n => `${n}.mp3`,          // 音檔在最外層（跟 index.html 同一層）
  photo: n => `${n}pic.png`,       // 照片在根目錄；若也放進資料夾，例如 img，改成 `img/${n}pic.png`
};

const field   = document.getElementById('field');
const bgVideo  = document.getElementById('bgVideo');
const pieceAudio = new Audio();   // 播放各月曲目用

/* ---- 產生漂浮樂譜 ---- */
// 用 4 欄 x 3 列的鬆散網格鋪開。座標是「中心點」，並保留邊界讓樂譜整張都看得到。
const cols = 4, rows = 3;
MONTHS.forEach((m, i) => {
  const col = i % cols;
  const row = Math.floor(i / cols);
  // 中心點範圍：橫向 16%~84%、縱向 20%~80%，邊界內樂譜不會被切掉
  const baseLeft = 16 + col * (68 / (cols - 1));
  const baseTop  = 20 + row * (60 / (rows - 1));
  const jx = (Math.random() - .5) * 5;   // 小幅抖動
  const jy = (Math.random() - .5) * 5;

  const el = document.createElement('div');
  el.className = 'sheet' + (m.isGame ? ' game' : '');
  el.style.left = (baseLeft + jx) + '%';
  el.style.top  = (baseTop + jy) + '%';
  el.style.setProperty('--rot', ((Math.random() - .5) * 8).toFixed(1) + 'deg');
  el.style.setProperty('--dur', (7 + Math.random() * 6).toFixed(1) + 's');
  el.style.setProperty('--delay', (-Math.random() * 6).toFixed(1) + 's');
  el.style.setProperty('--dx', ((Math.random() - .5) * 22).toFixed(0) + 'px');  // 漂浮幅度縮小
  el.style.setProperty('--dy', ((Math.random() - .5) * 20).toFixed(0) + 'px');

  el.innerHTML = `
    <div class="floatwrap">
      <div class="frame">
        <img src="${PATHS.sheet(m.num)}" alt="${m.name} 樂譜" loading="lazy"
             onerror="this.alt='缺少 ${PATHS.sheet(m.num)}'">
        <div class="label"><b>${m.name.split(' · ')[1] || m.name}</b>${m.en}</div>
      </div>
    </div>`;

  el.addEventListener('click', () => openMonth(m));
  field.appendChild(el);
});

/* ---- 進場：第一個手勢啟動背景音樂（手機必須這樣） ---- */
const enter = document.getElementById('enter');
document.getElementById('enterBtn').addEventListener('click', () => {
  enter.classList.add('hidden');
  document.getElementById('brand').style.display = 'block';
  document.getElementById('mute').style.display  = 'flex';
  playBg();
});

function playBg(){ bgVideo.play().catch(()=>{}); }

/* ---- 點擊月份 ---- */
const modal      = document.getElementById('modal');
const gameModal  = document.getElementById('gameModal');
const gameFrame  = document.getElementById('gameFrame');

function openMonth(m){
  if (m.isGame){
    // 四月 → 開 Unity 遊戲
    bgVideo.pause();
    gameFrame.src = 'game/index.html';
    gameModal.classList.add('show');
    return;
  }
  // 其他月份 → 顯示照片 + 播放曲目
  bgVideo.pause();
  document.getElementById('modalImg').src   = PATHS.photo(m.num);
  document.getElementById('modalImg').alt   = m.name + ' 照片';
  document.getElementById('modalMonth').textContent = m.en;
  document.getElementById('modalTitle').textContent = m.name;

  pieceAudio.src = PATHS.music(m.num);
  pieceAudio.currentTime = 0;
  pieceAudio.play()
    .then(()=> document.getElementById('modalPlay').textContent = '正在播放…')
    .catch(()=> document.getElementById('modalPlay').textContent = '（找不到 ' + PATHS.music(m.num) + '）');

  modal.classList.add('show');
}

/* ---- 關閉彈窗 ---- */
document.querySelectorAll('[data-close]').forEach(btn => {
  btn.addEventListener('click', () => closeAll(btn.dataset.close));
});
modal.addEventListener('click', e => { if (e.target === modal) closeAll('modal'); });

function closeAll(which){
  if (which === 'modal'){
    modal.classList.remove('show');
    pieceAudio.pause();
  }
  if (which === 'game'){
    gameModal.classList.remove('show');
    gameFrame.src = 'about:blank';   // 停掉遊戲
  }
  if (!muted) playBg();              // 回到主頁恢復背景音樂
}

/* ---- 靜音鈕 ---- */
let muted = false;
const muteBtn = document.getElementById('mute');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  bgVideo.muted = muted;
  muteBtn.textContent = muted ? '🔇' : '♪';
  if (!muted && modal.classList.contains('show')===false && gameModal.classList.contains('show')===false){
    playBg();
  }
});
</script>
</body>
</html>
